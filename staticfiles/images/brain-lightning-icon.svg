<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f5ff"/>
      <stop offset="100%" stop-color="#7b61ff"/>
    </linearGradient>
    <linearGradient id="lightningGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f5ff"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#00f5ff" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Brain Shape -->
  <path d="M50 15 C35 15 25 25 25 40 C25 50 30 58 35 62 C38 65 38 70 35 75 C32 80 35 85 40 85 L60 85 C65 85 68 80 65 75 C62 70 62 65 65 62 C70 58 75 50 75 40 C75 25 65 15 50 15Z" 
        fill="rgba(0,245,255,0.1)" 
        stroke="url(#brainGrad)" 
        stroke-width="2"
        filter="url(#glow)"/>
  
  <!-- Brain Folds -->
  <path d="M35 40 Q42 35 50 40" stroke="url(#brainGrad)" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M50 40 Q58 35 65 40" stroke="url(#brainGrad)" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M35 50 Q42 45 50 50" stroke="url(#brainGrad)" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M50 50 Q58 45 65 50" stroke="url(#brainGrad)" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M40 60 Q50 55 60 60" stroke="url(#brainGrad)" stroke-width="1.5" fill="none" opacity="0.6"/>
  
  <!-- Brain Stem -->
  <path d="M48 82 L48 88 L52 88 L52 82" stroke="url(#brainGrad)" stroke-width="2" fill="none" opacity="0.4"/>
  
  <!-- Lightning Bolt -->
  <path d="M42 25 L35 48 L46 44 L40 70 L58 46 L47 50 L55 25 L42 25Z" 
        fill="url(#lightningGrad)" 
        opacity="0.9"
        filter="url(#glow)"/>
  
  <!-- Small Sparkle Effects -->
  <circle cx="30" cy="22" r="2" fill="#00f5ff" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="70" cy="22" r="1.5" fill="#7b61ff" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="25" cy="45" r="1.5" fill="#00f5ff" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="75" cy="45" r="2" fill="#7b61ff" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.2;0.5" dur="2.2s" repeatCount="indefinite"/>
  </circle>
</svg>