{% extends 'base.html' %}
{% block active_contact %}active{% endblock %}
{% block content %}

{% if success %}

<div class="success-overlay">

    <div class="success-modal">

        <h3>✓ Inquiry Submitted</h3>

        <p>
            Thank you for reaching out to Mindrizz.
            A member of our team will contact you shortly.
        </p>

        <button class="btn">
            Got It
        </button>

    </div>

</div>

{% endif %}



<section class="contact-section">

<h2>How Can We Help You?</h2>

<form method="POST" class="contact-form">

{% csrf_token %}

<input
type="text"
name="name"
placeholder="Your Name"
required
>

<input
type="email"
name="email"
placeholder="Business Email"
required
>

<input
type="text"
name="phone"
placeholder="Phone Number"
required
>

<input
type="text"
name="company"
placeholder="Company Name"
required
>

<textarea
name="requirement"
rows="6"
placeholder="Tell us about your automation goals, challenges, or project requirements..."
required
></textarea>

<button type="submit" class="btn">

Submit Request

</button>

</form>

</section>

{% endblock %}
