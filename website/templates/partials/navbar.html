{% load static %}
<nav id="main-nav">

    <a href="/" class="logo" aria-label="Mindrizz Home">
        <svg class="logo-svg" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <defs>
                <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%"   stop-color="#6C63FF"/>
                    <stop offset="100%" stop-color="#00D4FF"/>
                </linearGradient>
                <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%"   stop-color="#00D4FF"/>
                    <stop offset="100%" stop-color="#6C63FF"/>
                </linearGradient>
            </defs>
            <!-- Brain lobes -->
            <path d="M10 24 C10 14 18 8 24 8 C30 8 38 14 38 24"
                  stroke="url(#logoGrad)" stroke-width="2.8" stroke-linecap="round" fill="none"/>
            <!-- Left lobe bulge -->
            <path d="M10 24 C6 20 6 28 10 30 C12 34 16 38 20 38"
                  stroke="url(#logoGrad)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
            <!-- Right lobe bulge -->
            <path d="M38 24 C42 20 42 28 38 30 C36 34 32 38 28 38"
                  stroke="url(#logoGrad)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
            <!-- Brain stem base -->
            <path d="M20 38 Q24 42 28 38" stroke="url(#logoGrad)" stroke-width="2.2" stroke-linecap="round" fill="none"/>
            <!-- Brain center crease -->
            <path d="M24 8 L24 38" stroke="url(#logoGrad)" stroke-width="1.4" stroke-linecap="round" stroke-dasharray="2 3" opacity="0.5"/>
            <!-- Left neural wrinkles -->
            <path d="M14 18 Q12 22 15 25" stroke="url(#logoGrad)" stroke-width="1.6" stroke-linecap="round" fill="none" opacity="0.7"/>
            <path d="M13 28 Q15 32 18 33" stroke="url(#logoGrad)" stroke-width="1.6" stroke-linecap="round" fill="none" opacity="0.7"/>
            <!-- Right neural wrinkles -->
            <path d="M34 18 Q36 22 33 25" stroke="url(#logoGrad)" stroke-width="1.6" stroke-linecap="round" fill="none" opacity="0.7"/>
            <path d="M35 28 Q33 32 30 33" stroke="url(#logoGrad)" stroke-width="1.6" stroke-linecap="round" fill="none" opacity="0.7"/>
            <!-- Lightning bolt overlay (centered) -->
            <path d="M27 10 L20 24 H25 L21 38 L32 21 H26 L30 10 Z"
                  fill="url(#boltGrad)" opacity="0.88"/>
        </svg>
        <span class="logo-wordmark">Mind<span class="logo-accent">rizz</span></span>
    </a>

    <button class="menu-toggle" aria-label="Toggle navigation" aria-expanded="false">
