{% load static %}

<nav class="nav-premium">
    <a href="/" class="logo-container">
        <!-- Brand Symbol - Brain + Lightning -->
        <div class="brand-symbol pulse" style="width:44px;height:44px;">
            <img src="{% static 'images/brain-lightning-icon.svg' %}" 
                 alt="MindRizz Brand Symbol" 
                 style="width:100%;height:100%;"
                 loading="eager"
                 width="44"
                 height="44">
        </div>
        
        <!-- Logo Text -->
        <span class="logo-text">MindRizz</span>
    </a>
    
    <button class="menu-toggle" aria-label="Toggle navigation" style="display:none;background:none;border:none;color:white;font-size:2rem;cursor:pointer;padding:0;line-height:1;">
        ☰
    </button>

    <ul class="nav-links" style="display:flex;gap:32px;list-style:none;align-items:center;margin:0;padding:0;">
        <li>
            <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">
                Home
            </a>
        </li>
        <li>
            <a href="/services/" class="nav-link {% if 'services' in request.path %}active{% endif %}">
                Services
            </a>
        </li>
        <li>
            <a href="/about/" class="nav-link {% if 'about' in request.path %}active{% endif %}">
                About
            </a>
        </li>
        <li>
            <a href="/contact/" class="nav-link {% if 'contact' in request.path %}active{% endif %}">
                Contact
            </a>
        </li>
    </ul>
</nav>

<style>
    @media (max-width: 768px) {
        .nav-premium {
            padding: 12px 5%;
            position: relative;
        }
        .nav-premium .logo-text {
            font-size: 1.2rem;
        }
        .nav-premium .brand-symbol {
            width: 36px !important;
            height: 36px !important;
        }
        .menu-toggle {
            display: block !important;
        }
        .nav-links {
            display: none !important;
        }
        .nav-links.active {
            display: flex !important;
            flex-direction: column;
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            padding: 24px 0;
            background: rgba(5, 8, 22, 0.98);
            backdrop-filter: blur(20px);
            gap: 18px;
            text-align: center;
            z-index: 1001;
            border-bottom: 1px solid rgba(0, 245, 255, 0.06);
        }
    }
</style>

<script>
    // Mobile menu toggle
    document.addEventListener('DOMContentLoaded', function() {
        const toggle = document.querySelector('.menu-toggle');
        const nav = document.querySelector('.nav-links');
        if (toggle && nav) {
            toggle.addEventListener('click', function() {
                nav.classList.toggle('active');
                this.textContent = nav.classList.contains('active') ? '✕' : '☰';
            });
        }
        
        // Close on outside click
        document.addEventListener('click', function(e) {
            const nav = document.querySelector('.nav-links');
            const toggle = document.querySelector('.menu-toggle');
            if (nav && toggle && nav.classList.contains('active')) {
                if (!nav.contains(e.target) && !toggle.contains(e.target)) {
                    nav.classList.remove('active');
                    toggle.textContent = '☰';
                }
            }
        });
    });
</script>
