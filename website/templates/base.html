{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}MindRizz | AI Consulting & Business Automation{% endblock %}</title>
    
    <meta name="description" content="{% block meta_description %}MindRizz helps businesses automate workflows, reduce operational costs, and scale with AI-powered solutions and intelligent automation.{% endblock %}">
    <meta name="keywords" content="AI Automation, Business Automation, AI Consulting, Chatbots, Process Optimization, Data Analytics, AI Solutions">
    <meta name="author" content="MindRizz AI Solutions">
    <meta name="robots" content="index, follow">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="{% static 'images/brain-lightning-icon.svg' %}">
    
    <!-- Open Graph -->
    <meta property="og:title" content="MindRizz | AI Consulting & Business Automation">
    <meta property="og:description" content="Helping businesses automate operations and scale through AI-powered solutions.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://mindrizz-ai-solutions.onrender.com">
    <meta property="og:image" content="{% static 'images/og-image.jpg' %}">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="MindRizz | AI Consulting & Business Automation">
    <meta name="twitter:description" content="Helping businesses automate operations and scale through AI-powered solutions.">
    <meta name="twitter:image" content="{% static 'images/twitter-card.jpg' %}">

    <!-- ===== PREMIUM FONTS ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!-- ===== STYLESHEETS ===== -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/premium-enhancements.css' %}">

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DJXHBYYHKC"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-DJXHBYYHKC');
    </script>

    {% block extra_head %}{% endblock %}
</head>

<body>
    <!-- Background Particles -->
    <div class="particles" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>

    <!-- Navigation -->
    {% include 'partials/navbar.html' %}

    <!-- Main Content -->
    <main id="main-content" role="main">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    {% include 'partials/footer.html' %}

    <!-- ===== JAVASCRIPT ===== -->
    <script src="{% static 'js/main.js' %}"></script>
    <script src="{% static 'js/premium-animations.js' %}"></script>

    <!-- Page Transition -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            document.body.classList.remove("fade-out");
        });

        document.querySelectorAll('a[href]').forEach(link => {
            link.addEventListener('click', function(e) {
                const href = this.getAttribute('href');
                if (href && !href.startsWith('#') && !href.startsWith('mailto:') && !href.startsWith('tel:') && !href.startsWith('javascript:')) {
                    e.preventDefault();
                    document.body.classList.add('fade-out');
                    setTimeout(() => {
                        window.location.href = href;
                    }, 300);
                }
            });
        });
    </script>

    {% block extra_scripts %}{% endblock %}
</body>

</html>
